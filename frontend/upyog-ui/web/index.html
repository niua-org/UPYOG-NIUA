<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <!-- Static assets in public/ are served at root, base path handled by Vite -->
    <link rel="icon" href="/upyog-ui/browser-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@nudmcdgnpm/upyog-css@3.0.0/dist/index.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="theme-color" content="#00bcd1"/>
    <!-- Runtime config (STATE_LEVEL_TENANT_ID, etc.). Without it, many MDMS/API calls used undefined tenant. -->
    <script src="https://s3.ap-south-1.amazonaws.com/in-egov-assets/globalConfigs.js"></script>
    <script src="https://pgtest.atomtech.in/staticdata/ots/js/atomcheckout.js"></script>
    <title>UPYOG</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      Vite requires the entry script here in index.html as type="module"
      CRA injected this automatically — Vite requires it explicitly
    -->
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
