# =============================================================================
# jasperreports.properties: Java 17 / WildFly 26 safe configuration
# Overrides default.jasperreports.properties from jasperreports-6.20.0.jar
# =============================================================================

# CRITICAL: Explicitly use JRThreadSubreportRunnerFactory for subreport execution.
#
# The default JasperReports runner (ThreadPoolSubreportRunnerFactory in some
# versions/configurations) has known compatibility issues when running on
# Java 17 due to the stricter module system and reflective access restrictions
# introduced since Java 9.
#
# Symptoms may include report generation failures, IllegalAccessException,
# InaccessibleObjectException, or unexpected subreport execution errors.
#
# Do not remove or change this setting without validating report generation
# across all supported report templates on Java 17+.
net.sf.jasperreports.subreport.runner.factory=net.sf.jasperreports.engine.fill.JRThreadSubreportRunnerFactory

# Compile report expressions using Java 17.
org.eclipse.jdt.core.compiler.source=17
org.eclipse.jdt.core.compiler.compliance=17
org.eclipse.jdt.core.compiler.codegen.targetPlatform=17

# Font settings: use Helvetica (built-in PDF font, no file needed)
net.sf.jasperreports.default.font.name=SansSerif
net.sf.jasperreports.default.pdf.font.name=Helvetica

# PDF encoding and font embedding settings.
net.sf.jasperreports.default.pdf.encoding=Cp1252
net.sf.jasperreports.default.pdf.embedded=false

# Override awt.ignore.missing.font to prevent Arial lookup failures
net.sf.jasperreports.awt.ignore.missing.font=true

# Register custom Jasper font extensions.
net.sf.jasperreports.extension.registry.factory.fonts=net.sf.jasperreports.engine.fonts.SimpleFontExtensionsRegistryFactory
net.sf.jasperreports.extension.simple.font.families.edcr=fonts/fonts.xml
net.sf.jasperreports.export.xls.detect.cell.type=true
